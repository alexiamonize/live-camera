<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Camera</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #fff; color: #1f2937; line-height: 1.6; }
        
        .main { padding: 2rem 1.5rem; max-width: 720px; margin: 0 auto; }
        
        header { display: flex; align-items: center; gap: 1rem; margin-bottom: 2.5rem; }
        .logo { width: 48px; height: 48px; background: #000; border-radius: 8px; display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 700; font-size: 24px; }
        .header-text h1 { font-size: 24px; font-weight: 500; margin: 0; }
        .header-text p { font-size: 13px; color: #6b7280; margin: 0; }
        
        button { padding: 0.75rem 1.5rem; font-size: 14px; font-weight: 500; border-radius: 6px; border: 0.5px solid #d1d5db; background: #fff; color: #1f2937; cursor: pointer; }
        button:hover { border-color: #9ca3af; background: #f9fafb; }
        .btn-primary { background: #000; color: #fff; border-color: #000; }
        .btn-primary:hover { background: #1f2937; }
        
        video { width: 100%; aspect-ratio: 9/16; max-height: 500px; border-radius: 8px; background: #000; margin: 1.5rem 0; object-fit: cover; }
        
        .status-bar { background: #fafafa; border: 0.5px solid #e5e7eb; border-radius: 6px; padding: 1rem; margin: 1.5rem 0; display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; font-size: 13px; }
        .status-item { display: flex; flex-direction: column; gap: 0.25rem; }
        .status-label { color: #9ca3af; font-size: 11px; }
        .status-value { font-weight: 500; }
        
        .guidance-box { background: #f0fdf4; border: 0.5px solid #bbf7d0; border-radius: 6px; padding: 0.75rem 1rem; font-size: 13px; color: #166534; margin: 1rem 0; }
        
        .card { background: #fafafa; border: 0.5px solid #e5e7eb; border-radius: 8px; padding: 1.5rem; margin: 1.5rem 0; }
        .card h2 { font-size: 16px; font-weight: 500; margin-bottom: 1rem; }
        .card p { color: #1f2937; line-height: 1.8; }
        
        .screen { display: none; }
        .screen.active { display: block; }
        
        .controls { display: flex; gap: 1rem; margin-top: 1.5rem; flex-wrap: wrap; }
        
        .spinner { width: 2rem; height: 2rem; border: 2px solid #e5e7eb; border-top-color: #000; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 1rem auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .hidden { display: none; }
        
        /* Sidebar */
        .sidebar { width: 0; background: #1f2937; color: #fff; padding: 0; overflow: hidden; transition: width 0.3s; position: fixed; right: 0; top: 0; height: 100vh; z-index: 1000; }
        .sidebar.open { width: 280px; padding: 2rem 1.5rem; }
        .sidebar h3 { font-size: 16px; margin-bottom: 1.5rem; }
        .sidebar a { display: block; padding: 0.75rem 0; color: #d1d5db; text-decoration: none; font-size: 14px; border-bottom: 0.5px solid rgba(255,255,255,0.1); }
        .sidebar a:hover { color: #fff; }
        .sidebar-close { background: none; border: none; color: #fff; font-size: 24px; cursor: pointer; float: right; padding: 0.5rem; }
        
        .menu-btn { position: fixed; bottom: 2rem; right: 2rem; width: 56px; height: 56px; background: #000; color: #fff; border: none; border-radius: 50%; cursor: pointer; font-size: 24px; z-index: 999; }
        .menu-btn:hover { background: #1f2937; }
        
        input[type="text"] { width: 100%; padding: 0.75rem; border: 0.5px solid #d1d5db; border-radius: 6px; font-size: 14px; margin: 0.75rem 0; }
        
        .frame-guide { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 85%; aspect-ratio: 9/12; border: 2px solid rgba(0,0,0,0.3); border-radius: 6px; pointer-events: none; }
        .video-wrapper { position: relative; }
    </style>
</head>
<body>
    <div class="main">
        <header>
            <div class="logo">L</div>
            <div class="header-text">
                <h1>Live Camera</h1>
                <p>Smart photography</p>
            </div>
        </header>

        <!-- Home -->
        <div id="homeScreen" class="screen active">
            <p style="color: #6b7280; margin-bottom: 1.5rem;">Get haptic and audio guidance to frame your shots perfectly.</p>
            <button class="btn-primary" onclick="startCamera()">Start camera</button>
        </div>

        <!-- Camera -->
        <div id="cameraScreen" class="screen hidden">
            <div class="video-wrapper">
                <video id="video" autoplay playsinline></video>
                <div class="frame-guide"></div>
            </div>
            
            <div class="status-bar">
                <div class="status-item">
                    <span class="status-label">Location</span>
                    <span class="status-value" id="locationStatus">Detecting…</span>
                </div>
                <div class="status-item">
                    <span class="status-label">Light level</span>
                    <span class="status-value" id="lightStatus">Analyzing…</span>
                </div>
            </div>

            <div class="guidance-box">
                <span id="guidanceText">Framing your subject</span>
            </div>

            <div class="controls">
                <button class="btn-primary" onclick="capturePhoto()" style="flex: 1; padding: 1rem;">Capture</button>
                <button onclick="stopCamera()">Cancel</button>
            </div>
        </div>

        <!-- Results -->
        <div id="resultsScreen" class="screen hidden">
            <img id="capturedImage" alt="Your photo" style="width: 100%; border-radius: 8px; max-width: 400px; display: block; margin: 1.5rem auto;">

            <div id="analyzing" class="hidden">
                <div class="spinner"></div>
                <p style="text-align: center; color: #6b7280;">Analyzing photo</p>
            </div>

            <div id="resultsContent" class="hidden">
                <div class="card">
                    <h2>Description</h2>
                    <p id="description"></p>
                    <button onclick="readAloud()" style="margin-top: 0.75rem;">🔊 Read aloud</button>
                </div>

                <div class="card">
                    <h2>Alt-text</h2>
                    <input type="text" id="altText" readonly>
                    <button onclick="copyAlt()">Copy</button>
                </div>

                <div class="controls" style="margin-top: 2rem;">
                    <button class="btn-primary" onclick="captureAnother()">Capture another</button>
                    <button onclick="goHome()">Done</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
        <button class="sidebar-close" onclick="toggleSidebar()">✕</button>
        <h3>Help & Info</h3>
        <a href="#" onclick="alert('Getting started guide coming soon'); return false;">Getting started</a>
        <a href="#" onclick="alert('FAQ coming soon'); return false;">FAQ</a>
        <a href="#" onclick="alert('Contact form coming soon'); return false;">Contact us</a>
        <h3 style="margin-top: 2rem;">Legal</h3>
        <a href="#" onclick="alert('Privacy: No images stored or transmitted.'); return false;">Privacy policy</a>
        <a href="#" onclick="alert('Terms: Use at your own risk.'); return false;">Terms of service</a>
        <a href="#" onclick="alert('Accessibility statement coming soon'); return false;">Accessibility</a>
    </div>

    <!-- Menu Button -->
    <button class="menu-btn" onclick="toggleSidebar()">≡</button>

    <canvas id="canvas" style="display: none;"></canvas>

    <script>
        let stream = null, lightCheckInterval = null;

        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
        }

        async function startCamera() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' }, audio: false });
                document.getElementById('video').srcObject = stream;
                showScreen('cameraScreen');
                speak('Camera started');
                detectLocation();
                startGuidance();
                startLightCheck();
            } catch (e) { alert('Camera access denied'); }
        }

        function stopCamera() {
            if (stream) stream.getTracks().forEach(t => t.stop());
            if (lightCheckInterval) clearInterval(lightCheckInterval);
            showScreen('homeScreen');
        }

        function detectLocation() {
            navigator.geolocation?.getCurrentPosition(
                pos => {
                    const lat = pos.coords.latitude.toFixed(3);
                    const lon = pos.coords.longitude.toFixed(3);
                    document.getElementById('locationStatus').textContent = `${lat}, ${lon}`;
                },
                () => document.getElementById('locationStatus').textContent = 'Unavailable'
            );
        }

        function startGuidance() {
            const messages = ['Subject centered', 'Hold steady', 'Ready to capture'];
            let idx = 0;
            const interval = setInterval(() => {
                if (idx < messages.length) {
                    document.getElementById('guidanceText').textContent = messages[idx];
                    speak(messages[idx]);
                    if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
                    idx++;
                } else clearInterval(interval);
            }, 3000);
        }

        function startLightCheck() {
            const video = document.getElementById('video');
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');
            lightCheckInterval = setInterval(() => {
                if (!stream || video.videoWidth === 0) return;
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                ctx.drawImage(video, 0, 0);
                const data = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
                let brightness = 0;
                for (let i = 0; i < data.length; i += 4) brightness += (data[i] + data[i+1] + data[i+2]) / 3;
                const percent = Math.round((brightness / (data.length / 4) / 255) * 100);
                document.getElementById('lightStatus').textContent = percent < 20 ? 'Too dark' : percent > 85 ? 'Too bright' : 'Good';
            }, 1000);
        }

        function capturePhoto() {
            const video = document.getElementById('video');
            const canvas = document.getElementById('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            document.getElementById('capturedImage').src = canvas.toDataURL('image/jpeg');
            stopCamera();
            showScreen('resultsScreen');
            speak('Photo captured');
            generateDescription();
        }

        function generateDescription() {
            document.getElementById('analyzing').classList.remove('hidden');
            document.getElementById('resultsContent').classList.add('hidden');
            setTimeout(() => {
                const desc = "A well-framed composition with good lighting and clear subject positioning.";
                const alt = "Well-composed photo with good lighting";
                document.getElementById('description').textContent = desc;
                document.getElementById('altText').value = alt;
                document.getElementById('analyzing').classList.add('hidden');
                document.getElementById('resultsContent').classList.remove('hidden');
                speak('Ready');
            }, 1500);
        }

        function readAloud() { speak(document.getElementById('description').textContent); }
        function copyAlt() { navigator.clipboard.writeText(document.getElementById('altText').value); alert('Copied'); }
        function captureAnother() { showScreen('homeScreen'); startCamera(); }
        function goHome() { showScreen('homeScreen'); }
        function speak(text) { if ('speechSynthesis' in window) speechSynthesis.speak(new SpeechSynthesisUtterance(text)); }
    </script>
</body>
</html>
